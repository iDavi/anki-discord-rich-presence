name: Release

# Publishing a release happens in one of three ways:
#   * pushing a tag like `v1.2.3`
#   * running this workflow manually (workflow_dispatch) with a tag input
#   * pushing a commit whose message contains a marker like `[release v1.2.3]`
# The last option exists because some environments only allow pushing branches
# (not tags); the workflow then creates the tag itself at the pushed commit.

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version to release (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build .ankiaddon
        run: python build.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: anki-discord-rich-presence
          path: dist/anki-discord-rich-presence.ankiaddon

      - name: Decide whether to publish a release
        id: decide
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          publish=false
          tag=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            publish=true
            tag="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            publish=true
            tag="${{ github.event.inputs.tag }}"
          else
            # Look for a [release vX.Y.Z] marker in the pushed commit message.
            marker=$(printf '%s' "$COMMIT_MSG" | grep -oE '\[release v[0-9]+\.[0-9]+\.[0-9]+\]' | head -n1 || true)
            if [ -n "$marker" ]; then
              publish=true
              tag=$(printf '%s' "$marker" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+')
            fi
          fi
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Publish: $publish  Tag: $tag"

      - name: Publish GitHub release
        if: steps.decide.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.decide.outputs.tag }}
          tag_name: ${{ steps.decide.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/anki-discord-rich-presence.ankiaddon
